<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Blind Memory</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            overflow: hidden;
            touch-action: none;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <canvas id="game"></canvas>
    
    <script src="lib/kontra.min.js"></script>
    <script type="module" src="js/main.js"></script>
    <!-- Debug panel for Android -->
<div id="debug-panel" style="position: fixed; bottom: 5px; left: 5px; right: 5px; background: rgba(0,0,0,0.9); color: #0f0; font-size: 10px; padding: 5px; border-radius: 5px; z-index: 9999; max-height: 150px; overflow-y: auto; font-family: monospace;">
  <div style="font-weight: bold;">Console:</div>
  <div id="debug-output"></div>
</div>

<script>
  (function() {
    const output = document.getElementById('debug-output');
    
    // Show console logs
    const originalLog = console.log;
    console.log = function() {
      const msg = Array.from(arguments).join(' ');
      output.innerHTML += '📝 ' + msg + '<br>';
      originalLog.apply(console, arguments);
    };
    
    // Show errors
    window.onerror = function(msg, url, line, col, error) {
      output.innerHTML += '❌ ERROR: ' + msg + ' (line ' + line + ')<br>';
      return false;
    };
    
    // Show when scripts load
    output.innerHTML += '✅ Debug panel ready<br>';
  })();
</script>
</body>
</html>
